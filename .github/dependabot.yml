version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/workers/eden-voice-agent"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      worker-deps:
        applies-to: version-updates
        update-types: ["minor", "patch"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
