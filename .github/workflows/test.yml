name: test

on:
  push:
  pull_request:

jobs:
  shellcheck-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: shellcheck scripts/*.sh

      - name: Run test suite
        run: |
          set -euo pipefail
          for f in tests/test_*.sh; do
            echo "--- $f ---"
            timeout 60 bash "$f"
          done
