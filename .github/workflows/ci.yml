name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  tests:
    name: Shell Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run shell tests
        run: |
          set -euo pipefail

          tests=(
            tests/test_bin_wrappers.sh
            tests/test_dws_backup.sh
            tests/test_dws_boot_verify.sh
            tests/test_dws_cleanup.sh
            tests/test_dws_cron_setup.sh
            tests/test_dws_doctor.sh
            tests/test_dws_firewall.sh
            tests/test_dws_health.sh
            tests/test_dws_health_full.sh
            tests/test_dws_launcher_status.sh
            tests/test_dws_log_viewer.sh
            tests/test_dws_motd.sh
            tests/test_dws_rotate_logs.sh
            tests/test_dws_sessions_init.sh
            tests/test_dws_sessions_metadata.sh
            tests/test_dws_status_header.sh
            tests/test_dws_sync_mac.sh
            tests/test_dws_tailscale_diag.sh
            tests/test_dws_termius_setup.sh
            tests/test_vm_setup_cron.sh
            tests/test_vm_setup_sshd_hardening.sh
          )
          summary_file="${GITHUB_STEP_SUMMARY:-}"
          expected_tests=21

          printf 'Configured %s test files\n' "${#tests[@]}"

          if [ "${#tests[@]}" -ne "${expected_tests}" ]; then
            printf 'Expected %s configured test files, found %s\n' "${expected_tests}" "${#tests[@]}" >&2
            exit 1
          fi

          failures=0
          failed_tests=()

          if [ -n "${summary_file}" ]; then
            {
              printf '| Test File | Result |\n'
              printf '| --- | --- |\n'
            } >>"${summary_file}"
          fi

          for test_file in "${tests[@]}"; do
            printf '\n==> %s\n' "${test_file}"

            if [ ! -f "${test_file}" ]; then
              printf 'FAIL %s (missing file)\n' "${test_file}" >&2
              failed_tests+=("${test_file} (missing file)")
              failures=$((failures + 1))
              if [ -n "${summary_file}" ]; then
                printf '| `%s` | FAIL (missing file) |\n' "${test_file}" >>"${summary_file}"
              fi
              continue
            fi

            if bash "${test_file}"; then
              printf 'PASS %s\n' "${test_file}"
              if [ -n "${summary_file}" ]; then
                printf '| `%s` | PASS |\n' "${test_file}" >>"${summary_file}"
              fi
            else
              status=$?
              printf 'FAIL %s (exit %s)\n' "${test_file}" "${status}" >&2
              failed_tests+=("${test_file} (exit ${status})")
              failures=$((failures + 1))
              if [ -n "${summary_file}" ]; then
                printf '| `%s` | FAIL (exit %s) |\n' "${test_file}" "${status}" >>"${summary_file}"
              fi
            fi
          done

          if [ "${failures}" -ne 0 ]; then
            printf '\nFailed test files (%s):\n' "${failures}" >&2
            printf ' - %s\n' "${failed_tests[@]}" >&2
            if [ -n "${summary_file}" ]; then
              printf '\nFailed test files (%s):\n' "${failures}" >>"${summary_file}"
              printf '%s\n' "${failed_tests[@]}" | sed 's/^/- /' >>"${summary_file}"
            fi
            exit 1
          fi

          printf '\nAll %s test files passed\n' "${#tests[@]}"
          if [ -n "${summary_file}" ]; then
            printf '\nAll %s test files passed\n' "${#tests[@]}" >>"${summary_file}"
          fi
