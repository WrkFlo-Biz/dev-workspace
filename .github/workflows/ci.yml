name: ci

on:
  push:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run shell tests
        run: |
          set -euo pipefail

          mapfile -t tests < <(find tests -mindepth 1 -maxdepth 1 -type f -name '*.sh' | sort)
          expected_tests=21

          printf 'Discovered %s test files\n' "${#tests[@]}"

          if [ "${#tests[@]}" -ne "${expected_tests}" ]; then
            printf 'Expected %s test files, found %s\n' "${expected_tests}" "${#tests[@]}" >&2
            exit 1
          fi

          failures=0

          for test_file in "${tests[@]}"; do
            printf '\n==> %s\n' "$test_file"
            if timeout 60 bash "$test_file"; then
              printf 'PASS %s\n' "$test_file"
            else
              status=$?
              printf 'FAIL %s (exit %s)\n' "$test_file" "$status" >&2
              failures=$((failures + 1))
            fi
          done

          if [ "$failures" -ne 0 ]; then
            printf '\n%s test file(s) failed\n' "$failures" >&2
            exit 1
          fi

          printf '\nAll %s test files passed\n' "${#tests[@]}"
