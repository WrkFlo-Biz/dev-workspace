# dev-workspace SSH hardening drop-in.
#
# Install to:
#   /etc/ssh/sshd_config.d/zz-dws-hardening.conf
#
# This is intentionally a late-sorting drop-in so it overrides the cloud image
# defaults without rewriting the vendor-managed files.

PasswordAuthentication no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no
PubkeyAuthentication yes
PermitRootLogin no

# Favor fast failure detection for mobile operators while keeping sessions alive
# across transient network issues.
ClientAliveInterval 30
ClientAliveCountMax 3
