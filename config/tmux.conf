# Wrk-Flo dev-workspace tmux config
# Optimized for phone (Termius) + Mac Terminal.app

# Prefix: Ctrl-a (easier on phone keyboards than Ctrl-b)
# For nested tmux (Mac->SSH->VM), double-tap Ctrl-a to send to inner session
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Session defaults
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256color*:Tc,xterm*:Tc"
set -g history-limit 50000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Mouse toggle (prefix-m) — turn off for Termius copy/paste, back on after
bind m set -g mouse \; display 'mouse #{?mouse,on,off}'

# Status bar
set -g status-style 'bg=#1a1a2e,fg=#e0e0e0'
set -g status-left '#[fg=#00d4ff,bold] #S #[default]│ '
set -g status-left-length 20
set -g status-right '#[fg=#888]#h │ %H:%M'
set -g status-right-length 30

# Pane borders
set -g pane-border-style 'fg=#333'
set -g pane-active-border-style 'fg=#00d4ff'

# Pane splitting — both intuitive and phone-friendly keys
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
bind v split-window -h -c '#{pane_current_path}'
bind s split-window -v -c '#{pane_current_path}'
unbind '"'
unbind %

# New window keeps current path
bind c new-window -c '#{pane_current_path}'

# Vi mode for copy/scroll
setw -g mode-keys vi
bind [ copy-mode

# Vim-style pane navigation (works on phone without Alt key)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt-arrow pane switching (desktop convenience, may conflict with Termius)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Quick reload
bind r source-file ~/.tmux.conf \; display 'config reloaded'

# Health dashboard popup (prefix-H, uppercase to avoid conflict with pane-left)
bind H display-popup -E -w 80% -h 80% '~/bin/dws-health.sh; read -rp "press enter to close"'

# Don't rename windows automatically
set -g allow-rename off
