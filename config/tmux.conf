# Wrk-Flo dev-workspace tmux config
# Optimized for phone (Termius) + Mac Terminal.app

# Prefix: Ctrl-a (easier on phone keyboards than Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Session defaults
set -g default-terminal "screen-256color"
set -g history-limit 50000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Status bar
set -g status-style 'bg=#1a1a2e,fg=#e0e0e0'
set -g status-left '#[fg=#00d4ff,bold] #S #[default]│ '
set -g status-left-length 20
set -g status-right '#[fg=#888]#h │ %H:%M'
set -g status-right-length 30

# Pane borders
set -g pane-border-style 'fg=#333'
set -g pane-active-border-style 'fg=#00d4ff'

# Pane splitting (intuitive keys)
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
unbind '"'
unbind %

# New window keeps current path
bind c new-window -c '#{pane_current_path}'

# Vi mode for copy/scroll
setw -g mode-keys vi
bind [ copy-mode

# Quick reload
bind r source-file ~/.tmux.conf \; display 'config reloaded'

# Health dashboard popup (prefix-h)
bind h display-popup -E -w 80% -h 80% '~/bin/dws-health.sh; read -rp "press enter to close"'

# Fast pane switching (Alt-arrow, no prefix needed — great for phone)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Don't rename windows automatically
set -g allow-rename off
